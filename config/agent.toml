[manager]
prefer_container_manager = true
enable_container_agents = true
child_spawn_enabled = true
child_spawn_max_depth = 6
child_spawn_container_only = true
unsafe_host_communication_enabled = false
hook_extensions_enabled = true
hook_extensions_container_only = true
socket_bus_enabled = true
socket_bus_container_only = true
socket_bus_max_channel_messages = 256
container_package_installs_enabled = false
container_required_permissions = [
    "playwright",
    "filesystem_write",
]
default_container_image = "ghcr.io/pinokio-ai/pinokio-agent-micro:local"

[auth]
enabled = false
required = false
provider = "none"
session_file = "~/.pinokio-agent/session.json"
token_env = "PINOKIO_AUTH_TOKEN"
user_env = "PINOKIO_AUTH_USER"

[marketplace]
enabled = false
source = "oss"
send_task_events = true

[playwright]
managed_by_rust = true
default_use_user_context = true
default_headless = false
require_user_context_permission = true
allow_user_context_any_domain = true
user_context_domain_allowlist = [
    "mail.google.com",
    "accounts.google.com",
    "gmail.com",
    "outlook.live.com",
    "login.live.com",
    "live.com",
    "outlook.com",
    "hotmail.com",
    "outlook.office.com",
    "office.com",
    "account.microsoft.com",
    "twitch.tv",
    "x.com",
    "twitter.com",
    "linkedin.com",
    "facebook.com",
    "instagram.com",
    "discord.com",
    "slack.com",
]
auth_domain_hints = [
    "mail.google.com",
    "outlook.live.com",
    "login.live.com",
    "gmail.com",
    "hotmail.com",
    "outlook.com",
    "twitch.tv",
    "x.com",
    "twitter.com",
    "linkedin.com",
    "facebook.com",
    "instagram.com",
    "discord.com",
    "slack.com",
]
container_fallback_non_auth = true
user_context_dir = "~/.pinokio-agent/playwright-profile"
auto_install_node_deps = true
node_setup_command = "npm install --omit=dev"
auto_install_chromium = true
install_command = "npx playwright install chromium"
host_service_command = "node workers/playwright-service.ts"
request_timeout_ms = 45000

[ui]
enabled = true
host = "localhost"
port = 5173
auto_install_node_deps = true
node_setup_command = "npm --prefix ui install --no-audit --no-fund --silent"
build_on_start = false
build_command = "npm --prefix ui run build"
serve_command = "npm --prefix ui run dev -- --host {host} --port {port}"
https_enabled = true
auto_trust_local_https = true
auto_publish_agent_pages = true
pages_dir = "~/.pinokio-agent/ui-pages"
max_page_bytes = 262144

[ui.extensions.configure]
kind = "core"
slot = "settings"
title = "Manager Configure"
detail = "Credential setup and extension registration surface."
route = "/ui/configure"
order = 10
enabled = true

[orchestrator]
backend = "auto"
enabled = true
default_image = "ghcr.io/pinokio-ai/pinokio-agent-micro:local"
allow_custom_images = true
allowed_custom_image_prefixes = [
    "ghcr.io/pinokio-ai/",
    "docker.io/library/alpine",
    "mcr.microsoft.com/playwright",
    "alpine:",
]
agent_entrypoint = "/usr/local/bin/pinokio-agent"
mounts = ["/tmp:/tmp"]
mount_workspace = true
workspace_mount_path = "/app"
managed_network_name = "pinokio-agent-net"
ensure_managed_network = true
auto_create_networks = true
additional_networks = []
dns_servers = [
    "1.1.1.1",
    "8.8.8.8",
]
swarm_poll_interval_ms = 1000
allow_backend_fallback = true
auto_init_swarm = false
auto_pull_images = true
inject_host_binary = true

[orchestrator.resource_images]
plugins = "ghcr.io/pinokio-ai/pinokio-agent-micro:local"
connections = "ghcr.io/pinokio-ai/pinokio-agent-micro:local"
filesystem = "ghcr.io/pinokio-ai/pinokio-agent-micro:local"

[orchestrator.resource_networks]

[orchestrator.services]

[connectors.host_twitter]
auth_env = ["TWITTER_BEARER_TOKEN"]
allowed_resources = ["twitter"]
host_only = true

[connectors.host_mail]
auth_env = [
    "MAIL_TOKEN",
    "MAIL_REFRESH_TOKEN",
]
allowed_resources = ["email"]
host_only = true

[connections.telegram]
command = "node plugins/telegram-connection.ts"
host_only = true
auth_env = ["TELEGRAM_BOT_TOKEN"]
allowed_actions = [
    "read",
    "create",
]

[connections.telegram.capabilities]
allow_spawn_child = false
allow_hook_requests = true
allow_network = true
allow_filesystem = false

[connections.telegram.permissions]
create = true
read = true
update = false
delete = false
spawn_child = false
hook_extensions = true
network = true
filesystem_read = false
filesystem_write = false
exec = false
memory_read = false
memory_write = false
playwright = false

